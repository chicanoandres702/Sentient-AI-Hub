name: Sentient Agent Hub Bootstrap

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Validate GitHub App secrets
        run: |
          if [ -z "${{ secrets.GITHUB_APP_ID }}" ] || [ -z "${{ secrets.GITHUB_APP_PRIVATE_KEY }}" ] || [ -z "${{ secrets.GITHUB_APP_INSTALL_ID }}" ]; then
            echo "Missing GitHub App secrets!"
            exit 1
          fi

      - name: Run agent tests
        run: npm test

      - name: Run CI/CD gates
        run: npm run check-gates
